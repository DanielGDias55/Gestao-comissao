<!DOCTYPE html>
<html lang="pt-br" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Financeiro - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .date-input-container { position: relative; display: flex; align-items: center; cursor: pointer; }
        input[type="month"] { position: relative; background: transparent; z-index: 1; cursor: pointer; }
        input[type="month"]::-webkit-calendar-picker-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 0; opacity: 0; cursor: pointer; }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-closed { transform: translateX(100%); }
        .dark input { color-scheme: dark; }
        #login-screen { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen">

    <div id="login-screen" class="fixed inset-0 bg-slate-900/90 z-[2000] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-200 dark:border-slate-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold dark:text-white">Acesso Restrito</h2>
                <p class="text-slate-500 text-sm">Entre para sincronizar seus dados</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-pass" placeholder="Senha" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-500/20">Entrar / Cadastrar</button>
            </div>
            <p id="auth-error" class="text-rose-500 text-xs mt-4 text-center hidden"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden" onclick="toggleSidebar()"></div>
        
        <aside id="sidebar" class="fixed right-0 top-0 h-full w-full sm:w-80 bg-white dark:bg-slate-900 shadow-2xl z-50 p-6 sidebar-closed border-l border-slate-200 dark:border-slate-800 overflow-y-auto">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-lg font-semibold dark:text-white">Configurações</h3>
                <button onclick="logout()" class="text-rose-500 text-xs font-bold flex items-center gap-1"><i data-lucide="log-out" class="w-3 h-3"></i> Sair</button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Salário Base</label>
                    <input type="number" id="base-sal" oninput="atualizarCalculosAutomáticos()" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Plano de Saúde</label>
                    <input type="number" id="desc-saude" onchange="saveConfigs()" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none">
                </div>
                <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700">
                    <div class="flex items-center justify-between mb-3 text-xs font-bold text-slate-500 uppercase">
                        <span>VT</span><input type="checkbox" id="active-vt" onchange="atualizarCalculosAutomáticos()">
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <input type="number" id="perc-vt" oninput="atualizarCalculosAutomáticos()" class="w-16 bg-white dark:bg-slate-900 border rounded text-center">% 
                        <span id="val-vt-display" class="font-bold text-blue-500">R$ 0,00</span>
                    </div>
                </div>
                <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700">
                    <div class="flex items-center justify-between mb-3 text-xs font-bold text-slate-500 uppercase">
                        <span>Adiantamento</span><input type="checkbox" id="active-adm" onchange="atualizarCalculosAutomáticos()">
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <input type="number" id="perc-adm" oninput="atualizarCalculosAutomáticos()" class="w-16 bg-white dark:bg-slate-900 border rounded text-center">% 
                        <span id="val-adm-display" class="font-bold text-blue-500">R$ 0,00</span>
                    </div>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="w-full mt-8 py-3 bg-slate-900 dark:bg-white text-white dark:text-black rounded-xl font-bold">Salvar e Fechar</button>
        </aside>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
            <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-8 text-center lg:text-left">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Gestão de Contratos</h1>
                    <p class="text-slate-500 text-sm">Sincronizado na Nuvem</p>
                </div>
                <div class="flex flex-col sm:flex-row items-center gap-3 bg-white dark:bg-slate-900 p-3 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
                    <button onclick="toggleDarkMode()" class="p-2 text-slate-500 dark:text-amber-400"><i data-lucide="sun"></i></button>
                    <div class="flex border border-slate-100 dark:border-slate-800 rounded-xl px-2 bg-slate-50/50 dark:bg-slate-800/50">
                        <div class="date-input-container px-2 py-1.5"><input type="month" id="data-inicio" onchange="renderizarTabela()" class="text-[10px] font-bold w-24 outline-none uppercase bg-transparent"></div>
                        <span class="text-slate-300 px-1">→</span>
                        <div class="date-input-container px-2 py-1.5"><input type="month" id="data-fim" onchange="renderizarTabela()" class="text-[10px] font-bold w-24 outline-none uppercase bg-transparent text-right"></div>
                    </div>
                    <button onclick="novaLinha()" class="w-full sm:w-auto bg-emerald-500 text-white px-6 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-200 dark:shadow-none"><i data-lucide="plus" class="w-4 h-4"></i> Cliente</button>
                </div>
            </header>

            <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-8">
                <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border-l-4 border-l-blue-500 shadow-sm"><p class="text-[9px] font-bold text-slate-400 uppercase">Bruto</p><p id="res-bruto" class="font-bold">R$ 0,00</p></div>
                <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border-l-4 border-l-amber-500 shadow-sm"><p class="text-[9px] font-bold text-slate-400 uppercase">INSS</p><p id="res-inss" class="font-bold">R$ 0,00</p></div>
                <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border-l-4 border-l-rose-500 shadow-sm"><p class="text-[9px] font-bold text-slate-400 uppercase">IRRF</p><p id="res-irrf" class="font-bold">R$ 0,00</p></div>
                <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border-l-4 border-l-indigo-500 shadow-sm"><p class="text-[9px] font-bold text-slate-400 uppercase">Fixos</p><p id="res-descontos" class="font-bold">R$ 0,00</p></div>
                <div class="col-span-2 lg:col-span-1 bg-emerald-600 p-4 rounded-xl shadow-lg shadow-emerald-200"><p class="text-[9px] font-bold text-emerald-100 uppercase">Líquido</p><p id="res-liquido" class="text-xl font-black text-white leading-none">R$ 0,00</p></div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden hidden sm:block">
                <table class="w-full text-left"><thead class="bg-slate-900 text-white uppercase text-[10px]"><tr><th class="px-6 py-4">Cliente</th><th class="text-center">Lic.</th><th class="text-center">Mês</th><th>Link</th><th class="text-center">R$ / Un</th><th class="text-center">Pago</th><th class="text-right px-6"></th></tr></thead><tbody id="corpo-tabela" class="divide-y divide-slate-100 dark:divide-slate-800 font-medium text-sm"></tbody></table>
            </div>
            <div id="mobile-lista" class="sm:hidden space-y-4"></div>
        </main>
        <button onclick="toggleSidebar()" class="fixed bottom-6 right-6 w-14 h-14 bg-slate-900 dark:bg-white text-white dark:text-black rounded-full shadow-2xl flex items-center justify-center z-40"><i data-lucide="settings-2"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhGH_zr0zMBGuvd4Ggz9M8mlxbstKJuyI",
            authDomain: "meufinanceiro-c6536.firebaseapp.com",
            projectId: "meufinanceiro-c6536",
            storageBucket: "meufinanceiro-c6536.firebasestorage.app",
            messagingSenderId: "472630772518",
            appId: "1:472630772518:web:d3f16146a4ce498e4f37e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;

        // AUTH HANDLER
        window.handleAuth = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('auth-btn');
            const err = document.getElementById('auth-error');
            
            try {
                btn.innerText = "Processando...";
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } catch (e2) {
                    err.innerText = "Erro: Verifique os dados ou a ativação no Firebase.";
                    err.classList.remove('hidden');
                    btn.innerText = "Entrar / Cadastrar";
                }
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // SYNC & CRUD
        function syncData() {
            const configRef = ref(db, `users/${currentUser.uid}/configs`);
            onValue(configRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    window.configs = data;
                    document.getElementById('base-sal').value = data.salBase;
                    document.getElementById('desc-saude').value = data.saude;
                    document.getElementById('perc-vt').value = data.vtPerc;
                    document.getElementById('active-vt').checked = data.vtActive;
                    document.getElementById('perc-adm').value = data.admPerc;
                    document.getElementById('active-adm').checked = data.admActive;
                    atualizarCalculosAutomáticos();
                }
            });

            const dataRef = ref(db, `users/${currentUser.uid}/clientes`);
            onValue(dataRef, (snapshot) => {
                window.dados = [];
                const val = snapshot.val();
                for (let id in val) { window.dados.push({ id, ...val[id] }); }
                renderizarTabela();
            });
        }

        window.saveConfigs = () => {
            set(ref(db, `users/${currentUser.uid}/configs`), window.configs);
        };

        window.novaLinha = () => {
            const newClient = { cliente: "", licencas: 1, mes: new Date().toISOString().slice(0, 7), vindi: "", valorUnitario: 40.00, pago: false };
            push(ref(db, `users/${currentUser.uid}/clientes`), newClient);
        };

        window.excluirLinha = (id) => {
            if(confirm("Excluir?")) remove(ref(db, `users/${currentUser.uid}/clientes/${id}`));
        };

        window.atualizarDado = (id, campo, valor) => {
            const updateObj = {};
            updateObj[campo] = (['licencas', 'valorUnitario'].includes(campo)) ? parseFloat(valor) : valor;
            update(ref(db, `users/${currentUser.uid}/clientes/${id}`), updateObj);
        };

        // UI HELPERS (Transplantados do seu código anterior)
        window.toggleDarkMode = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            lucide.createIcons();
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        };

        window.atualizarCalculosAutomáticos = () => {
            const base = parseFloat(document.getElementById('base-sal').value) || 0;
            const pVT = parseFloat(document.getElementById('perc-vt').value) || 0;
            const pAdm = parseFloat(document.getElementById('perc-adm').value) || 0;
            const vtAtivo = document.getElementById('active-vt').checked;
            const admAtivo = document.getElementById('active-adm').checked;
            
            document.getElementById('val-vt-display').innerText = (vtAtivo ? base * (pVT/100) : 0).toLocaleString('pt-br',{style:'currency',currency:'BRL'});
            document.getElementById('val-adm-display').innerText = (admAtivo ? base * (pAdm/100) : 0).toLocaleString('pt-br',{style:'currency',currency:'BRL'});
            
            window.configs = { salBase: base, saude: parseFloat(document.getElementById('desc-saude').value)||0, vtPerc: pVT, vtActive: vtAtivo, admPerc: pAdm, admActive: admAtivo };
            saveConfigs();
        };

        window.renderizarTabela = () => {
            const dInicio = document.getElementById('data-inicio').value;
            const dFim = document.getElementById('data-fim').value;
            const corpo = document.getElementById('corpo-tabela');
            const listaMobile = document.getElementById('mobile-lista');
            corpo.innerHTML = ""; listaMobile.innerHTML = "";
            
            const filtered = (window.dados || []).filter(item => (!dInicio || item.mes >= dInicio) && (!dFim || item.mes <= dFim));
            filtered.sort((a,b) => a.mes.localeCompare(b.mes));

            filtered.forEach(item => {
                const tr = document.createElement('tr'); tr.className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors";
                tr.innerHTML = `<td class="px-6 py-4"><input type="text" value="${item.cliente}" onchange="atualizarDado('${item.id}', 'cliente', this.value)" class="w-full bg-transparent outline-none"></td>
                <td class="text-center"><input type="number" value="${item.licencas}" onchange="atualizarDado('${item.id}', 'licencas', this.value)" class="w-12 bg-slate-100 dark:bg-slate-800 rounded px-1 py-1 text-center font-bold"></td>
                <td class="text-center"><div class="date-input-container w-28 mx-auto bg-slate-50 dark:bg-slate-800 rounded-lg border dark:border-slate-700 px-2 py-1"><input type="month" value="${item.mes}" onchange="atualizarDado('${item.id}', 'mes', this.value)" class="text-[10px] font-bold w-full bg-transparent"></div></td>
                <td><div class="flex items-center gap-2"><input type="text" value="${item.vindi}" onchange="atualizarDado('${item.id}', 'vindi', this.value)" placeholder="Link..." class="text-[10px] bg-transparent border-b border-slate-100 w-full outline-none">${item.vindi.startsWith('http') ? `<a href="${item.vindi}" target="_blank" class="text-blue-500"><i data-lucide="external-link" class="w-3.5 h-3.5"></i></a>`:''}</div></td>
                <td class="text-center"><div class="relative w-20 mx-auto font-bold"><span class="absolute left-0 text-[10px] text-slate-400">R$</span><input type="number" value="${item.valorUnitario}" onchange="atualizarDado('${item.id}', 'valorUnitario', this.value)" class="w-full bg-transparent text-right outline-none"></div></td>
                <td class="text-center"><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" ${item.pago ? 'checked' : ''} onchange="atualizarDado('${item.id}', 'pago', this.checked)" class="sr-only peer"><div class="w-8 h-4 bg-slate-200 dark:bg-slate-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-emerald-500"></div></label></td>
                <td class="text-right px-6"><button onclick="excluirLinha('${item.id}')" class="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>`;
                corpo.appendChild(tr);

                const card = document.createElement('div'); card.className="bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 space-y-3";
                card.innerHTML = `<div class="flex justify-between font-bold"> <input type="text" value="${item.cliente}" onchange="atualizarDado('${item.id}', 'cliente', this.value)" class="bg-transparent outline-none flex-1"> <button onclick="excluirLinha('${item.id}')"><i data-lucide="trash-2" class="w-4 h-4 text-slate-300"></i></button> </div>
                <div class="grid grid-cols-2 gap-2 text-xs"> <div class="bg-slate-50 dark:bg-slate-800 p-2 rounded-lg"> <p class="text-[9px] text-slate-400 uppercase">Licenças</p> <input type="number" value="${item.licencas}" onchange="atualizarDado('${item.id}', 'licencas', this.value)" class="font-bold bg-transparent"> </div> <div class="bg-slate-50 dark:bg-slate-800 p-2 rounded-lg"> <p class="text-[9px] text-slate-400 uppercase">Mês</p> <input type="month" value="${item.mes}" onchange="atualizarDado('${item.id}', 'mes', this.value)" class="font-bold bg-transparent w-full"> </div> </div>
                <div class="flex justify-between items-center pt-2"> <label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" ${item.pago ? 'checked' : ''} onchange="atualizarDado('${item.id}', 'pago', this.checked)" class="sr-only peer"><div class="w-8 h-4 bg-slate-200 dark:bg-slate-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-emerald-500"></div><span class="ml-2 text-[10px] font-bold">${item.pago?'PAGO':'PENDENTE'}</span></label> ${item.vindi.startsWith('http') ? `<a href="${item.vindi}" target="_blank" class="text-[10px] font-bold text-blue-500 bg-blue-50 dark:bg-blue-900/30 px-3 py-1 rounded-lg">VINDI</a>` : ''} </div>`;
                listaMobile.appendChild(card);
            });
            lucide.createIcons();
            calcularTudo();
        };

        window.calcularTudo = () => {
            const dInicio = document.getElementById('data-inicio').value;
            const dFim = document.getElementById('data-fim').value;
            let totalComissao = 0;
            (window.dados || []).forEach(item => {
                if(item.pago && (!dInicio || item.mes >= dInicio) && (!dFim || item.mes <= dFim)) totalComissao += (item.licencas * item.valorUnitario);
            });
            const c = window.configs || configs;
            let bruto = c.salBase + totalComissao;
            let inss = bruto <= 1620 ? bruto*0.075 : bruto <= 2850 ? 121.5+(bruto-1620)*0.09 : bruto <= 4200 ? 121.5+110.7+(bruto-2850)*0.12 : bruto <= 8500 ? 121.5+110.7+162+(bruto-4200)*0.14 : 995.5;
            let bIRRF = bruto - inss;
            let irrf = bIRRF <= 5000 ? 0 : bIRRF <= 5500 ? (bIRRF*0.225-675.49)*0.5 : bIRRF <= 6500 ? bIRRF*0.225-675.49 : bIRRF*0.275-908.73;
            let fixos = c.saude + (c.vtActive ? c.salBase*(c.vtPerc/100) : 0) + (c.admActive ? c.salBase*(c.admPerc/100) : 0);
            
            document.getElementById('res-bruto').innerText = bruto.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
            document.getElementById('res-inss').innerText = inss.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
            document.getElementById('res-irrf').innerText = irrf.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
            document.getElementById('res-descontos').innerText = fixos.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
            document.getElementById('res-liquido').innerText = (bruto - inss - irrf - fixos).toLocaleString('pt-br',{style:'currency',currency:'BRL'});
        };

        // Início
        if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark');
        lucide.createIcons();
    </script>
</body>
</html>
